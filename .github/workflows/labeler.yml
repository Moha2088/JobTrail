name: Labeler


on:
  pull_request:
    types: [ opened, synchronize ]


jobs:

  label:
    permissions:
        contents: read
        pull-requests: write
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Install Labeler
        uses: actions/labeler@v6.1.0
        with:
            repo-token: ${{ secrets.GITHUB_TOKEN }}