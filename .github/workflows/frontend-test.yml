name: Frontend test

env:
    NEXT-PATH: jobtrail-frontend

on:
  pull_request:
    types: [ opened, synchronize ]
  workflow_dispatch:


jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: cd ${{ env.NEXT-PATH }} && bun install

      - name: Build app
        run: cd ${{ env.NEXT-PATH }} && bun run build

      - name: Test lint
        run: cd ${{ env.NEXT-PATH }} && bun lint

      - name: Run E2E
        uses: cypress-io/github-action@v7.1.5
        with:
            wait-on: http://localhost:3000
            parallel: true
            browser: chrome
            build: npm run build
            start: npm start