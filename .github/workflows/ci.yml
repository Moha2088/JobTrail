name: CI

env:
  BACKEND_PATH: jobtrail-backend

on:
  pull_request:
    types: [ opened, synchronize ]
  workflow_dispatch:


jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd ${{ env.BACKEND_PATH }} && bun ci

      - name: Build app
        run: cd ${{ env.BACKEND_PATH }} && bun run build

      - name: Run migrations
        run: bun migrate